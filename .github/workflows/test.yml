name: Python application test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    # Add Redis service (required for production validation)
    services:
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: --health-cmd "redis-cli ping" --health-interval 10s

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Verify app import with production‑like env vars
      env:
        FLASK_ENV: production                # 👈 real production config
        SECRET_KEY: ${{ secrets.SECRET_KEY }}
        JWT_SECRET_KEY: ${{ secrets.JWT_SECRET_KEY }}
        DATABASE_URL: sqlite:///test.db      # or use PostgreSQL service
        REDIS_URL: redis://localhost:6379/0
        JWT_TOKEN_LOCATION: headers
        LIMITER_STORAGE_URI: redis://localhost:6379/0   # match Redis
      run: |
        python -c "
        import sys, traceback
        try:
            from app import app
            print('SUCCESS: App imports OK with production config')
        except Exception:
            traceback.print_exc()
            sys.exit(1)
        "

    - name: Lint with flake8 (fail on errors)
      run: |
        pip install flake8
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics