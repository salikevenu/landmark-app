name: Python application test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt || true
        pip install Flask-Limiter limits qrcode pillow python-dotenv Flask Flask-JWT-Extended Flask-Cors gunicorn razorpay requests Werkzeug
    
    - name: Lint with flake8 (optional)
      run: |
        pip install flake8
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics || true
    
    - name: Run import test with full traceback
      id: import_test
      env:
        DATABASE_URL: sqlite:///test.db
        SECRET_KEY: test-secret
        JWT_SECRET_KEY: test-jwt-secret
        JWT_TOKEN_LOCATION: headers
        LIMITER_STORAGE_URI: memory://
      run: |
        python -c "
        import sys, traceback
        try:
            from app import app
            print('SUCCESS: App imports OK')
        except Exception as e:
            print('FAILED:', file=sys.stderr)
            traceback.print_exc(file=sys.stderr)
            sys.exit(1)
        " 2>&1 | tee error.log
        exit ${PIPESTATUS[0]}
    
    - name: Upload error log on failure
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: import-error-log
        path: error.log
