services:
  - type: web
    name: landmark-backend
    runtime: python
    buildCommand: |
      apt-get update &&
      apt-get install -y libjpeg-dev zlib1g-dev libpng-dev &&
      pip install --no-cache-dir -r requirements.txt
    startCommand: waitress-serve --port=$PORT app:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9