<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>{% block title %}LANDMARK{% endblock %}</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<meta name="theme-color" content="#1f4ed8">
<link rel="manifest" href="/static/manifest.json">

<!-- GLOBAL STYLES (your custom dark theme) -->
<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

<!-- Bootstrap 5 (for admin dashboard grid & components) -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Chart.js (for revenue charts) -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
/* RESET (keep your existing overrides) */
body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    background-color: #020C1B;
    color: white;
}

/* Your custom button – override Bootstrap if needed */
.btn-primary {
    background: linear-gradient(45deg, #ffd700, #ffcc00);
    color: #1a1a1a;
    border: none;
    padding: 12px 25px;
    border-radius: 30px;
    font-weight: 600;
    cursor: pointer;
}

input {
    width: 100%;
    padding: 12px;
    margin: 8px 0;
    border-radius: 8px;
    border: 1px solid rgba(255,255,255,0.2);
    background: rgba(255,255,255,0.05);
    color: white;
}

input::placeholder {
    color: rgba(255,255,255,0.6);
}

.card {
    background: rgba(255,255,255,0.05);
    padding: 25px;
    border-radius: 16px;
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.1);
}

.container {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 20px;
}

.page-subtitle {
    color: rgba(255,255,255,0.7);
    margin-bottom: 15px;
}

.status-text {
    margin-top: 10px;
    font-size: 14px;
}

/* Optional: make Bootstrap tables adapt to dark background */
.table {
    color: white;
}
.table-striped > tbody > tr:nth-of-type(odd) > * {
    background-color: rgba(255,255,255,0.05);
}
</style>

</head>
<body>

<!-- MAIN CONTENT BLOCK – child templates will insert here -->
{% block content %}
{% endblock %}

<!-- Bootstrap JS bundle (required for some interactive components) -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>

<!-- GLOBAL SCRIPT -->
<script>
function changeLanguage(lang) {
    fetch("/set-language", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({ lang: lang })
    })
    .then(() => location.reload())
    .catch(err => console.error("Language change error:", err));
}
</script>

<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/static/sw.js');
  }
</script>
</body>
</html>
