{% extends "layouts/layout_public.html" %}

{% block title %}Login | LANDMARK{% endblock %}

{% block content %}

<style>
/* ----- GLOBAL NEON THEME ----- */
.login-wrapper {
    text-align: center;
    width: 100%;
    max-width: 420px;
    margin: 0 auto;
    background: rgba(12, 18, 28, 0.7);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(0, 255, 255, 0.3);
    border-radius: 32px;
    padding: 32px 28px;
    box-shadow: 0 0 20px rgba(0, 255, 255, 0.1);
}

.login-title {
    font-size: 2rem;
    font-weight: 700;
    color: #0ff;
    text-shadow: 0 0 5px #0ff;
}

.page-subtitle {
    color: #8aaee0;
    margin-bottom: 20px;
    font-size: 0.95rem;
}

input {
    width: 100%;
    padding: 12px;
    margin-bottom: 12px;
    border-radius: 30px;
    border: 1px solid #2a4c7a;
    background: #000;
    color: white;
    transition: 0.2s;
}

input:focus {
    outline: none;
    border-color: #0ff;
    box-shadow: 0 0 8px #0ff;
}

input:disabled {
    opacity: 0.5;
}

.btn-primary {
    width: 100%;
    padding: 12px;
    border-radius: 30px;
    background: #0ff;
    border: none;
    cursor: pointer;
    font-weight: bold;
    transition: 0.2s;
}

.btn-primary:hover {
    background: #0fa;
    box-shadow: 0 0 12px #0ff;
}

.btn-primary:disabled {
    opacity: 0.6;
    cursor: not-allowed;
    box-shadow: none;
}

.status-text {
    min-height: 30px;
    margin-top: 10px;
}

.status-text.error {
    color: #ff6b6b;
}

.status-text.success {
    color: #5dffb0;
}

.link-row {
    margin-top: 8px;
    font-size: 0.85rem;
}

.link-row button {
    background: none;
    border: none;
    color: #0ff;
    text-decoration: underline;
    cursor: pointer;
    font-size: 0.85rem;
    padding: 4px 8px;
}

.link-row button:disabled {
    color: #557;
    cursor: not-allowed;
    text-decoration: none;
}

/* ----- NEON CUSTOM CHECKBOX (Remember Me) ----- */
#rememberMe {
    display: none;
}

label[for="rememberMe"] {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    cursor: pointer;
    font-size: 0.85rem;
    color: #ccf;
    transition: 0.2s;
    margin: 12px 0;
}

label[for="rememberMe"]::before {
    content: "";
    width: 18px;
    height: 18px;
    border: 1px solid #0ff;
    border-radius: 4px;
    background: rgba(0, 20, 40, 0.8);
    display: inline-block;
    transition: 0.2s;
    box-shadow: 0 0 2px #0ff;
}

#rememberMe:checked + label::before {
    background: #0ff;
    box-shadow: 0 0 8px #0ff;
    content: "✓";
    color: #000;
    text-align: center;
    line-height: 18px;
    font-weight: bold;
}

label[for="rememberMe"]:hover::before {
    border-color: #0fa;
    box-shadow: 0 0 6px #0fa;
}

label[for="rememberMe"]:hover {
    text-shadow: 0 0 4px #0ff;
    color: #fff;
}

#rememberMe:focus + label::before {
    outline: 2px solid #0ff;
    outline-offset: 2px;
}
</style>

<div class="container">
    <div class="login-wrapper">
        <h2 class="login-title">Welcome Back</h2>
        <p class="page-subtitle" id="stepLabel">Enter your phone number</p>

        <input
            type="tel"
            id="phone"
            placeholder="Phone number"
            maxlength="10"
            autocomplete="tel"
            inputmode="numeric"
        >

        <div id="otpGroup" style="display:none;">
            <input
                type="text"
                id="otp"
                placeholder="Enter OTP"
                maxlength="6"
                autocomplete="one-time-code"
                inputmode="numeric"
            >
            <!-- NEON CHECKBOX -->
            <input type="checkbox" id="rememberMe">
            <label for="rememberMe">Remember me (stay logged in until you logout)</label>
        </div>

        <!-- Invisible reCAPTCHA container (Firebase requirement) -->
        <div id="recaptcha-container"></div>

        <button class="btn-primary" id="actionBtn" type="button">Send OTP</button>

        <div id="otpActions" class="link-row" style="display:none;">
            <button type="button" id="resendBtn">Resend OTP</button>
            <span>&middot;</span>
            <button type="button" id="changeNumberBtn">Change number</button>
        </div>

        <p id="statusMessage" class="status-text"></p>
    </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  import { getAuth, signInWithPhoneNumber, RecaptchaVerifier } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

  // ========== FIREBASE CONFIGURATION ==========
  // This config is meant to be public (it's shipped to every browser).
  // Actual protection comes from Firebase Security Rules / App Check,
  // not from hiding these values.
  const firebaseConfig = {
    apiKey: "AIzaSyDcMnIg7NT2RLnZ1ECTqSu-HVGz4TXxsKE",
    authDomain: "landmark-dde55.firebaseapp.com",
    projectId: "landmark-dde55",
    storageBucket: "landmark-dde55.firebasestorage.app",
    messagingSenderId: "204601925235",
    appId: "1:204601925235:web:a30963f83189219e681406",
    measurementId: "G-8MEJ5EDX3B"
  };
  // ============================================

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);

  // Resend cooldown (seconds) to avoid hammering Firebase / getting rate limited
  const RESEND_COOLDOWN_SECONDS = 30;

  let currentStep = "phone";
  let confirmationResult = null;
  let recaptchaVerifier = null;
  let recaptchaRenderPromise = null;
  let isSubmitting = false;
  let resendTimer = null;

  const phoneInput = document.getElementById("phone");
  const otpGroup = document.getElementById("otpGroup");
  const otpInput = document.getElementById("otp");
  const actionBtn = document.getElementById("actionBtn");
  const statusMsg = document.getElementById("statusMessage");
  const stepLabel = document.getElementById("stepLabel");
  const rememberMeCheckbox = document.getElementById("rememberMe");
  const otpActions = document.getElementById("otpActions");
  const resendBtn = document.getElementById("resendBtn");
  const changeNumberBtn = document.getElementById("changeNumberBtn");

  // ----- Friendly error messages -----
  // Firebase error messages can be cryptic or leak internal detail.
  // Map known codes to plain-language text; fall back to a generic message
  // for anything unrecognized so we never show raw SDK output to the user.
  const FRIENDLY_ERRORS = {
    "auth/invalid-phone-number": "That phone number doesn't look valid.",
    "auth/missing-phone-number": "Please enter a phone number.",
    "auth/quota-exceeded": "Too many attempts right now. Please try again later.",
    "auth/user-disabled": "This account has been disabled. Contact support.",
    "auth/operation-not-allowed": "Phone sign-in isn't enabled. Contact support.",
    "auth/too-many-requests": "Too many attempts. Please wait a bit and try again.",
    "auth/captcha-check-failed": "Security check failed. Please refresh and try again.",
    "auth/invalid-verification-code": "That code doesn't look right. Check and try again.",
    "auth/code-expired": "That code has expired. Request a new one.",
    "auth/network-request-failed": "Network issue — check your connection and try again."
  };

  function friendlyError(err, fallback) {
    if (err && err.code && FRIENDLY_ERRORS[err.code]) {
      return FRIENDLY_ERRORS[err.code];
    }
    return fallback;
  }

  function setStatus(message, type) {
    statusMsg.innerText = message;
    statusMsg.classList.remove("error", "success");
    if (type) statusMsg.classList.add(type);
  }

  // Helper to fully tear down and reset reCAPTCHA after an error
  function resetRecaptcha() {
    if (recaptchaVerifier) {
      try {
        recaptchaVerifier.clear();
      } catch (e) {
        // ignore — clear() can throw if never rendered
      }
    }
    const container = document.getElementById('recaptcha-container');
    if (container) container.innerHTML = '';
    recaptchaVerifier = null;
    recaptchaRenderPromise = null;
  }

  // Create the verifier. Correct param order for Firebase v10+:
  // auth instance, container id, options.
  function initializeRecaptcha() {
    try {
      recaptchaVerifier = new RecaptchaVerifier(
        auth,
        'recaptcha-container',
        {
          size: 'invisible',
          callback: () => {},
          'expired-callback': () => {
            resetRecaptcha();
          }
        }
      );
      return recaptchaVerifier;
    } catch (error) {
      setStatus('Failed to initialize security verification. Please refresh.', 'error');
      return null;
    }
  }

  // Ensure the verifier exists AND has been rendered exactly once.
  async function ensureRecaptchaReady() {
    if (!recaptchaVerifier) {
      const verifier = initializeRecaptcha();
      if (!verifier) throw new Error('Failed to initialize security verification');
    }
    if (!recaptchaRenderPromise) {
      recaptchaRenderPromise = recaptchaVerifier.render();
    }
    await recaptchaRenderPromise;
    return recaptchaVerifier;
  }

  function setLoading(loading) {
    isSubmitting = loading;
    actionBtn.disabled = loading;
  }

  function startResendCooldown() {
    let remaining = RESEND_COOLDOWN_SECONDS;
    resendBtn.disabled = true;
    resendBtn.innerText = `Resend OTP (${remaining}s)`;

    if (resendTimer) clearInterval(resendTimer);
    resendTimer = setInterval(() => {
      remaining -= 1;
      if (remaining <= 0) {
        clearInterval(resendTimer);
        resendTimer = null;
        resendBtn.disabled = false;
        resendBtn.innerText = 'Resend OTP';
      } else {
        resendBtn.innerText = `Resend OTP (${remaining}s)`;
      }
    }, 1000);
  }

  async function sendOtp() {
    const phone = phoneInput.value.trim();
    if (!phone.match(/^[6-9]\d{9}$/)) {
      setStatus('Enter a valid 10-digit Indian mobile number', 'error');
      return false;
    }
    const fullPhone = '+91' + phone;

    setLoading(true);
    setStatus('Sending OTP...', null);

    try {
      const verifier = await ensureRecaptchaReady();
      confirmationResult = await signInWithPhoneNumber(auth, fullPhone, verifier);
      setStatus('OTP sent! Check your phone.', 'success');
      return true;
    } catch (err) {
      setStatus(friendlyError(err, 'Failed to send OTP. Please try again.'), 'error');
      resetRecaptcha();
      return false;
    } finally {
      setLoading(false);
    }
  }

  async function handleAction() {
    if (isSubmitting) return;

    if (currentStep === 'phone') {
      const sent = await sendOtp();
      if (!sent) return;

      currentStep = 'otp';
      otpGroup.style.display = 'block';
      otpActions.style.display = 'flex';
      otpActions.style.justifyContent = 'center';
      otpActions.style.alignItems = 'center';
      otpActions.style.gap = '6px';
      actionBtn.innerText = 'Verify OTP';
      phoneInput.disabled = true;
      stepLabel.innerText = 'Enter OTP sent to your phone';
      startResendCooldown();
    } else {
      const otp = otpInput.value.trim();
      if (!otp) {
        setStatus('Please enter the OTP', 'error');
        return;
      }
      if (otp.length !== 6) {
        setStatus('OTP must be 6 digits', 'error');
        return;
      }

      setLoading(true);
      setStatus('Verifying...', null);

      try {
        const result = await confirmationResult.confirm(otp);
        const idToken = await result.user.getIdToken();
        const phone = phoneInput.value.trim();

        const response = await fetch('/api/auth/firebase-login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            idToken,
            phone,
            remember_me: rememberMeCheckbox.checked
          })
        });
        const data = await response.json();
        if (response.ok) {
          localStorage.setItem('access_token', data.access_token);
          if (data.refresh_token) localStorage.setItem('refresh_token', data.refresh_token);
          const role = data.user.role;
          setStatus('Login successful! Redirecting...', 'success');
          if (role === 'admin') {
            window.location.href = '/admin/dashboard';
          } else {
            window.location.href = '/api/user/dashboard';
          }
        } else {
          setStatus(data.error || 'Login failed. Please try again.', 'error');
        }
      } catch (err) {
        setStatus(friendlyError(err, 'Invalid OTP. Please try again.'), 'error');
      } finally {
        setLoading(false);
      }
    }
  }

  function resetToPhoneStep() {
    currentStep = 'phone';
    confirmationResult = null;
    otpGroup.style.display = 'none';
    otpActions.style.display = 'none';
    otpInput.value = '';
    actionBtn.innerText = 'Send OTP';
    phoneInput.disabled = false;
    stepLabel.innerText = 'Enter your phone number';
    setStatus('', null);
    if (resendTimer) {
      clearInterval(resendTimer);
      resendTimer = null;
    }
    resetRecaptcha();
    initializeRecaptcha();
  }

  // Wire up the main button
  actionBtn.addEventListener('click', handleAction);

  // Resend OTP without losing the phone step UI
  resendBtn.addEventListener('click', async () => {
    if (isSubmitting || resendBtn.disabled) return;
    resetRecaptcha();
    initializeRecaptcha();
    const sent = await sendOtp();
    if (sent) {
      otpInput.value = '';
      startResendCooldown();
    }
  });

  // Let the user go back and fix the phone number
  changeNumberBtn.addEventListener('click', () => {
    resetToPhoneStep();
  });

  // Allow Enter key too
  [phoneInput, otpInput].forEach((el) => {
    el.addEventListener('keydown', (event) => {
      if (event.key === 'Enter') {
        event.preventDefault();
        handleAction();
      }
    });
  });

  // Handle phone input formatting
  phoneInput.addEventListener('input', function () {
    this.value = this.value.replace(/\D/g, '').slice(0, 10);
  });

  // Handle OTP input formatting
  otpInput.addEventListener('input', function () {
    this.value = this.value.replace(/\D/g, '').slice(0, 6);
  });

  // Pre-create (but don't render) the verifier once the DOM is ready.
  initializeRecaptcha();
</script>

{% endblock %}
