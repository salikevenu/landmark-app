{% extends "layouts/layout_public.html" %}

{% block title %}Login | LANDMARK{% endblock %}

{% block content %}

<style>
/* ----- GLOBAL NEON THEME ----- */
.login-wrapper {
    text-align: center;
    width: 100%;
    max-width: 420px;
    margin: 0 auto;
    background: rgba(12, 18, 28, 0.7);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(0, 255, 255, 0.3);
    border-radius: 32px;
    padding: 32px 28px;
    box-shadow: 0 0 20px rgba(0, 255, 255, 0.1);
}

.login-title {
    font-size: 2rem;
    font-weight: 700;
    color: #0ff;
    text-shadow: 0 0 5px #0ff;
}

.page-subtitle {
    color: #8aaee0;
    margin-bottom: 20px;
    font-size: 0.95rem;
}

input {
    width: 100%;
    padding: 12px;
    margin-bottom: 12px;
    border-radius: 30px;
    border: 1px solid #2a4c7a;
    background: #000;
    color: white;
    transition: 0.2s;
}

input:focus {
    outline: none;
    border-color: #0ff;
    box-shadow: 0 0 8px #0ff;
}

.btn-primary {
    width: 100%;
    padding: 12px;
    border-radius: 30px;
    background: #0ff;
    border: none;
    cursor: pointer;
    font-weight: bold;
    transition: 0.2s;
}

.btn-primary:hover {
    background: #0fa;
    box-shadow: 0 0 12px #0ff;
}

.btn-primary:disabled {
    opacity: 0.6;
    cursor: not-allowed;
    box-shadow: none;
}

.status-text {
    min-height: 30px;
    margin-top: 10px;
}

/* ----- NEON CUSTOM CHECKBOX (Remember Me) ----- */
#rememberMe {
    display: none;
}

label[for="rememberMe"] {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    cursor: pointer;
    font-size: 0.85rem;
    color: #ccf;
    transition: 0.2s;
    margin: 12px 0;
}

label[for="rememberMe"]::before {
    content: "";
    width: 18px;
    height: 18px;
    border: 1px solid #0ff;
    border-radius: 4px;
    background: rgba(0, 20, 40, 0.8);
    display: inline-block;
    transition: 0.2s;
    box-shadow: 0 0 2px #0ff;
}

#rememberMe:checked + label::before {
    background: #0ff;
    box-shadow: 0 0 8px #0ff;
    content: "✓";
    color: #000;
    text-align: center;
    line-height: 18px;
    font-weight: bold;
}

label[for="rememberMe"]:hover::before {
    border-color: #0fa;
    box-shadow: 0 0 6px #0fa;
}

label[for="rememberMe"]:hover {
    text-shadow: 0 0 4px #0ff;
    color: #fff;
}

#rememberMe:focus + label::before {
    outline: 2px solid #0ff;
    outline-offset: 2px;
}
</style>

<div class="container">
    <div class="login-wrapper">
        <h2 class="login-title">Welcome Back</h2>
        <p class="page-subtitle" id="stepLabel">Enter your phone number</p>

        <input type="tel" id="phone" placeholder="Phone number" maxlength="10">

        <div id="otpGroup" style="display:none;">
            <input type="text" id="otp" placeholder="Enter OTP" maxlength="6">
            <!-- NEON CHECKBOX -->
            <input type="checkbox" id="rememberMe">
            <label for="rememberMe">Remember me (stay logged in until you logout)</label>
        </div>

        <!-- Invisible reCAPTCHA container (Firebase requirement) -->
        <div id="recaptcha-container"></div>

        <button class="btn-primary" id="actionBtn" type="button">Send OTP</button>

        <p id="statusMessage" class="status-text"></p>
    </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  import { getAuth, signInWithPhoneNumber, RecaptchaVerifier } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

  // ========== FIREBASE CONFIGURATION ==========
  const firebaseConfig = {
    apiKey: "AIzaSyBbArHgN6mqg8fVUJe93BDjlUqeCJhaGAY",
    authDomain: "landmark-dde55.firebaseapp.com",
    projectId: "landmark-dde55",
    storageBucket: "landmark-dde55.firebasestorage.app",
    messagingSenderId: "204601925235",
    appId: "1:204601925235:web:a30963f83189219e681406",
    measurementId: "G-8MEJ5EDX3B"
  };
  // ============================================

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);

  let currentStep = "phone";
  let confirmationResult = null;
  let recaptchaVerifier = null;
  let recaptchaRenderPromise = null;
  let isSubmitting = false;

  const phoneInput = document.getElementById("phone");
  const otpGroup = document.getElementById("otpGroup");
  const otpInput = document.getElementById("otp");
  const actionBtn = document.getElementById("actionBtn");
  const statusMsg = document.getElementById("statusMessage");
  const stepLabel = document.getElementById("stepLabel");
  const rememberMeCheckbox = document.getElementById("rememberMe");

  // Helper to fully tear down and reset reCAPTCHA after an error
  function resetRecaptcha() {
    if (recaptchaVerifier) {
      try {
        recaptchaVerifier.clear();
      } catch (e) {
        // ignore — clear() can throw if never rendered
      }
    }
    const container = document.getElementById('recaptcha-container');
    if (container) container.innerHTML = '';
    recaptchaVerifier = null;
    recaptchaRenderPromise = null;
  }

  // Create the verifier. ✅ CORRECT ORDER FOR FIREBASE v10+
  function initializeRecaptcha() {
    try {
      recaptchaVerifier = new RecaptchaVerifier(
        'recaptcha-container',    // container id (1st param) ✅
        {                         // options (2nd param) ✅
          size: 'invisible',
          callback: () => {
            console.log('✅ reCAPTCHA verified');
          },
          'expired-callback': () => {
            console.log('⚠️ reCAPTCHA expired - resetting');
            resetRecaptcha();
          }
        },
        auth                      // auth instance (3rd param) ✅
      );
      console.log('✅ RecaptchaVerifier initialized successfully');
      return recaptchaVerifier;
    } catch (error) {
      console.error('❌ Failed to initialize RecaptchaVerifier:', error);
      statusMsg.innerText = 'Failed to initialize security verification. Please refresh.';
      return null;
    }
  }

  // Ensure the verifier exists AND has been rendered exactly once.
  async function ensureRecaptchaReady() {
    if (!recaptchaVerifier) {
      const verifier = initializeRecaptcha();
      if (!verifier) throw new Error('Failed to initialize security verification');
    }
    if (!recaptchaRenderPromise) {
      recaptchaRenderPromise = recaptchaVerifier.render();
    }
    await recaptchaRenderPromise;
    return recaptchaVerifier;
  }

  function setLoading(loading) {
    isSubmitting = loading;
    actionBtn.disabled = loading;
  }

  async function handleAction() {
    if (isSubmitting) return;

    if (currentStep === 'phone') {
      const phone = phoneInput.value.trim();
      if (!phone.match(/^[6-9]\d{9}$/)) {
        statusMsg.innerText = 'Enter valid 10-digit phone number';
        return;
      }
      const fullPhone = '+91' + phone;

      setLoading(true);
      statusMsg.innerText = 'Sending OTP...';

      try {
        const verifier = await ensureRecaptchaReady();
        confirmationResult = await signInWithPhoneNumber(auth, fullPhone, verifier);
        statusMsg.innerText = 'OTP sent! Check your phone.';
        currentStep = 'otp';
        otpGroup.style.display = 'block';
        actionBtn.innerText = 'Verify OTP';
        phoneInput.disabled = true;
        stepLabel.innerText = 'Enter OTP sent to your phone';
      } catch (err) {
        console.error('Send OTP error:', err);
        statusMsg.innerText = err.message || 'Failed to send OTP.';
        resetRecaptcha();
      } finally {
        setLoading(false);
      }
    } else {
      const otp = otpInput.value.trim();
      if (!otp) {
        statusMsg.innerText = 'Please enter OTP';
        return;
      }
      if (otp.length < 6) {
        statusMsg.innerText = 'OTP must be 6 digits';
        return;
      }

      setLoading(true);
      statusMsg.innerText = 'Verifying...';

      try {
        const result = await confirmationResult.confirm(otp);
        const idToken = await result.user.getIdToken();
        const phone = phoneInput.value.trim();

        const response = await fetch('/api/auth/firebase-login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            idToken,
            phone,
            remember_me: rememberMeCheckbox.checked
          })
        });
        const data = await response.json();
        if (response.ok) {
          localStorage.setItem('access_token', data.access_token);
          if (data.refresh_token) localStorage.setItem('refresh_token', data.refresh_token);
          const role = data.user.role;
          statusMsg.innerText = 'Login successful! Redirecting...';
          if (role === 'admin') {
            window.location.href = '/admin/dashboard';
          } else {
            window.location.href = '/api/user/dashboard';
          }
        } else {
          statusMsg.innerText = data.error || 'Login failed';
        }
      } catch (err) {
        console.error('Verify OTP error:', err);
        statusMsg.innerText = 'Invalid OTP. Please try again.';
      } finally {
        setLoading(false);
      }
    }
  }

  // Wire up the button
  actionBtn.addEventListener('click', handleAction);

  // Allow Enter key too
  [phoneInput, otpInput].forEach((el) => {
    el.addEventListener('keydown', (event) => {
      if (event.key === 'Enter') {
        event.preventDefault();
        handleAction();
      }
    });
  });

  // Handle phone input formatting
  phoneInput.addEventListener('input', function () {
    this.value = this.value.replace(/\D/g, '').slice(0, 10);
  });

  // Handle OTP input formatting
  otpInput.addEventListener('input', function () {
    this.value = this.value.replace(/\D/g, '').slice(0, 6);
  });

  // Pre-create (but don't render) the verifier once the DOM is ready.
  initializeRecaptcha();

  console.log('Login page loaded successfully');
</script>

{% endblock %}
