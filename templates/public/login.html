{% extends "layouts/layout_public.html" %}

{% block title %}Login | LANDMARK{% endblock %}

{% block content %}

<style>
.login-wrapper {
    text-align: center;
    width: 100%;
    max-width: 420px;
    margin: 0 auto;
    background: rgba(12, 18, 28, 0.7);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(0, 255, 255, 0.3);
    border-radius: 32px;
    padding: 32px 28px;
}

.login-title {
    font-size: 2rem;
    font-weight: 700;
    color: #0ff;
}

.page-subtitle {
    color: #8aaee0;
    margin-bottom: 20px;
}

input {
    width: 100%;
    padding: 12px;
    margin-bottom: 12px;
    border-radius: 30px;
    border: 1px solid #2a4c7a;
    background: #000;
    color: white;
}

.btn-primary {
    width: 100%;
    padding: 12px;
    border-radius: 30px;
    background: #0ff;
    border: none;
    cursor: pointer;
}

.status-text {
    min-height: 30px;
    margin-top: 10px;
}
</style>

<div class="container">
    <div class="login-wrapper">
        <h2 class="login-title">Welcome Back</h2>
        <p class="page-subtitle" id="stepLabel">Enter your phone number</p>

        <input type="tel" id="phone" placeholder="Phone number" maxlength="10">

        <div id="otpGroup" style="display:none;">
            <input type="text" id="otp" placeholder="Enter OTP" maxlength="6">
        </div>

        <button id="actionBtn">Send OTP</button>

        <p id="statusMessage"></p>
    </div>  <!-- only one closing div -->
</div>

<script>
let currentStep = "phone";
let phoneNumber = "";

const phoneInput = document.getElementById("phone");
const otpInput = document.getElementById("otp");
const otpGroup = document.getElementById("otpGroup");
const actionBtn = document.getElementById("actionBtn");
const statusMsg = document.getElementById("statusMessage");
const stepLabel = document.getElementById("stepLabel");

function setStatus(text, isError=false) {
    statusMsg.innerText = text;
    statusMsg.style.color = isError ? "red" : "lightgreen";
}

function isValidPhone(phone) {
    return /^[6-9]\d{9}$/.test(phone);
}

async function sendOTP(phone) {
    try {
        const res = await fetch("/api/auth/send-otp", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({phone})
        });
        const data = await res.json();
        if (res.ok && data.status === "success") {
            return true;
        } else {
            setStatus(data.error || "Failed to send OTP", true);
            return false;
        }
    } catch {
        setStatus("Network error", true);
        return false;
    }
}

async function verifyOTP(phone, otp) {
    try {
        const res = await fetch("/api/auth/verify-otp", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ phone, otp })
        });
        const data = await res.json();
        if (res.ok) {
            // ✅ Standardised keys (used across all pages)
            localStorage.setItem("access_token", data.access_token);
            if (data.refresh_token) {
                localStorage.setItem("refresh_token", data.refresh_token);
            }
            window.location.href = "/api/user/dashboard";
        } else {
            setStatus(data.error || "Invalid OTP", true);
        }
    } catch {
        setStatus("Network error", true);
    }
}

actionBtn.addEventListener("click", async () => {
    if (currentStep === "phone") {
        const phone = phoneInput.value.trim();
        if (!isValidPhone(phone)) {
            setStatus("Enter valid phone number", true);
            return;
        }
        const sent = await sendOTP(phone);
        if (sent) {
            phoneNumber = phone;
            currentStep = "otp";
            otpGroup.style.display = "block";
            actionBtn.innerText = "Verify OTP";
            stepLabel.innerText = "Enter OTP";
        }
    } else {
        const otp = otpInput.value.trim();
        if (otp.length !== 6) {
            setStatus("Enter valid OTP", true);
            return;
        }
        await verifyOTP(phoneNumber, otp);
    }
});

// Enter key support
phoneInput.addEventListener("keypress", e => {
    if (e.key === "Enter") actionBtn.click();
});
otpInput.addEventListener("keypress", e => {
    if (e.key === "Enter") actionBtn.click();
});
</script>

{% endblock %}
