{% extends "layouts/layout_app.html" %}
{% block title %}Pricing | LANDMARK{% endblock %}
{% block content %}
<style>
  .pricing-container {
    max-width: 900px;
    margin: 40px auto;
    padding: 20px;
    color: #eef5ff;
  }
  .plans {
    display: flex;
    justify-content: center;
    gap: 30px;
    flex-wrap: wrap;
  }
  .plan-card {
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 20px;
    padding: 30px 20px;
    width: 220px;
    text-align: center;
    transition: 0.3s;
  }
  .plan-card:hover {
    transform: translateY(-5px);
    box-shadow: 0 0 20px rgba(255,215,0,0.2);
  }
  .plan-card h3 {
    color: #facc15;
    margin-bottom: 10px;
  }
  .price {
    font-size: 2rem;
    font-weight: 700;
    color: #fff;
    margin: 15px 0;
  }
  .btn-plan {
    background: linear-gradient(135deg, #facc15, #f59e0b);
    border: none;
    padding: 12px 25px;
    border-radius: 30px;
    font-weight: 700;
    color: #1a1a1a;
    cursor: pointer;
    transition: 0.2s;
    margin-top: 15px;
    width: 100%;
  }
  .btn-plan:disabled {
    opacity: 0.5;
    cursor: not-allowed;
  }
  .no-plans-msg {
    color: #cbd5e1;
    text-align: center;
    width: 100%;
  }
  .plan-card p {
    color: #cbd5e1;
  }
</style>

<div class="pricing-container">
  <h2 style="text-align:center; color:#facc15;">Choose Your Plan</h2>
  <div class="plans" id="plansContainer">
    <!-- Plans will be rendered by JavaScript -->
  </div>
</div>

<script src="https://checkout.razorpay.com/v1/checkout.js"></script>
<script>
  // All available plans – each plan now has 'eligibleRoles' so the
  // page knows who is allowed to see / buy it. Adjust these lists
  // to match your actual upgrade rules.
  const ALL_PLANS = [
    {
      id: "Service Provider",
      name: "Service Provider",
      price: 499,
      eligibleRoles: ["free"]
    },
    {
      id: "Business Basic",
      name: "Business Basic",
      price: 999,
      eligibleRoles: ["free", "service_provider"]
    },
    {
      id: "Business Premium",
      name: "Business Premium",
      price: 1999,
      eligibleRoles: ["free", "service_provider", "business_basic"]
    }
  ];

  // Reads a cookie value by name (used to grab the CSRF token
  // that flask-jwt-extended sets alongside the login cookie).
  function getCookie(name) {
    const match = document.cookie.match('(^|;)\\s*' + name + '\\s*=\\s*([^;]+)');
    return match ? decodeURIComponent(match.pop()) : '';
  }

  async function loadPlans() {
    // Fetch current user role from subscription-status endpoint
    let userRole = "free";
    try {
      const res = await fetch("/api/user/subscription-status", {
        credentials: "include"
      });
      if (res.ok) {
        const data = await res.json();
        userRole = data.role;
      }
    } catch (e) {
      console.error("Could not fetch role", e);
    }

    const container = document.getElementById("plansContainer");
    container.innerHTML = "";

    const visiblePlans = ALL_PLANS.filter(plan => plan.eligibleRoles.includes(userRole));

    if (visiblePlans.length === 0) {
      container.innerHTML = '<p class="no-plans-msg">No plans available for your current account. You may already be on the top plan.</p>';
      return;
    }

    visiblePlans.forEach(plan => {
      const card = document.createElement("div");
      card.className = "plan-card";
      card.innerHTML = `
        <h3>${plan.name}</h3>
        <div class="price">₹${plan.price}</div>
        <p>per month</p>
        <button class="btn-plan" onclick="startPayment('${plan.name}', event)">
          ${plan.id === "extra_business" ? "Buy Slot" : "Choose Plan"}
        </button>
      `;
      container.appendChild(card);
    });
  }

  async function startPayment(planName, event) {
    const button = event.target;
    button.disabled = true;
    button.innerText = "Processing...";

    try {
      const res = await fetch("/api/payment/create-order", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "X-CSRF-TOKEN": getCookie("csrf_access_token")
        },
        credentials: "include",
        body: JSON.stringify({
          plan: planName
        })
      });

      const data = await res.json();

      if (!res.ok || data.error) {
        alert(data.error || "Unable to create order");
        button.disabled = false;
        button.innerText = "Choose Plan";
        return;
      }

      const options = {
        key: data.key,
        amount: data.amount,
        currency: data.currency,
        order_id: data.order_id,
        name: "LANDMARK",
        description: planName,
        handler: async function (response) {
          try {
            const verifyRes = await fetch("/api/payment/verify-payment", {
              method: "POST",
              headers: {
                "Content-Type": "application/json",
                "X-CSRF-TOKEN": getCookie("csrf_access_token")
              },
              credentials: "include",
              body: JSON.stringify({
                razorpay_payment_id: response.razorpay_payment_id,
                razorpay_order_id: response.razorpay_order_id,
                razorpay_signature: response.razorpay_signature,
                plan: planName
              })
            });

            const verifyData = await verifyRes.json();

            if (verifyData.success) {
              alert(verifyData.message || "Payment successful!");
              window.location.href = verifyData.redirect || "/dashboard";
            } else {
              alert(verifyData.error || "Payment verification failed");
              button.disabled = false;
              button.innerText = "Choose Plan";
            }
          } catch (verifyError) {
            console.error("Verification error:", verifyError);
            alert("Payment verification failed. Please contact support.");
            button.disabled = false;
            button.innerText = "Choose Plan";
          }
        },
        modal: {
          ondismiss: function () {
            button.disabled = false;
            button.innerText = "Choose Plan";
          }
        },
        theme: {
          color: "#facc15"
        },
        prefill: {
          name: "",
          email: "",
          contact: ""
        },
        notes: {
          plan: planName,
          source: "web"
        }
      };

      const rzp = new Razorpay(options);

      rzp.on('payment.failed', function (response) {
        console.error("Payment failed:", response.error);
        alert(response.error.description || "Payment failed. Please try again.");
        button.disabled = false;
        button.innerText = "Choose Plan";
      });

      rzp.open();

    } catch (error) {
      console.error("Payment initiation error:", error);
      alert("Payment initiation failed: " + (error.message || "Unknown error"));
      button.disabled = false;
      button.innerText = "Choose Plan";
    }
  }

  document.addEventListener("DOMContentLoaded", loadPlans);
</script>
{% endblock %}
